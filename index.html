<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FOCUS HUBS</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div>
       <p class="eyebrow">FOCUS Fiber Field Locator</p>
<h1>Find My Hub</h1>
      </div>
    </section>

    <section class="search-card">
     <label for="searchInput">
    Search Hub, Road, Development or Cabinet
</label>
      <div class="search-row">
        <input id="searchInput"
       type="search"
       placeholder="Search hub, road or development..."
       autocomplete="off"
       autofocus />
        <button id="clearBtn" title="Clear search">×</button>
      </div>
     
     
    </section>

    <section class="route-card">
      <div>
        <strong>Route pad</strong>
        <span id="routeCount">0 stops</span>
      </div>
      <div class="route-actions">
        <button id="addAddressBtn">Add address</button>
        <button id="openRouteBtn">Open route</button>
        <button id="clearRouteBtn" class="danger">Clear</button>
      </div>
      <ol id="routeList"></ol>
    </section>

    <section class="stats" id="stats"></section>
    <section id="results" class="results"></section>
    <footer class="footer">
    Find My Hub • Version 1.0.0
</footer>
  </main>

  <template id="hubTemplate">
    <article class="hub-card">
      <div class="hub-top">
        <div>
          <h2></h2>
          <p class="subline"></p>
        </div>
       
      </div>
      <p class="address"></p>
      <div class="meta"></div>
      <div class="status-row"></div>
      <div class="actions">
        <button class="primary navigate">Navigate</button>
        <button class="secondary add-stop">Add stop</button>
        <button class="secondary save-location">Save Pin</button>
      </div>
    </article>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="./data/hubs-data.js"></script>
  <script src="./src/app.js"></script>
</body>
</html>
